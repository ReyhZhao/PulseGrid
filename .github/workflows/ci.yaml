name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  controlplane:
    name: Control plane tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: controlplane
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: controlplane/requirements-dev.txt
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Verify migrations are up to date
        run: python manage.py makemigrations --check --dry-run
        env:
          DJANGO_SETTINGS_MODULE: pulsegrid.settings_test
      - name: Run tests
        run: pytest -v

  worker:
    name: Worker tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: worker/requirements-dev.txt
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Run tests
        run: pytest -v

  frontend:
    name: Frontend tests & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Run tests
        run: npm test
      - name: Type-check and build
        run: npm run build

  helm:
    name: Helm chart lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Lint chart
        run: helm lint deployment --set secrets.djangoSecretKey=ci
      - name: Render templates
        run: >
          helm template ci deployment
          --set secrets.djangoSecretKey=ci
          --set devPostgres.enabled=true
          --set worker.enabled=true
          --set worker.existingSecret=worker-token
          > /dev/null
