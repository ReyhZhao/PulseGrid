# Default values for the PulseGrid chart.
# Point ArgoCD at deployment/chart/pulsegrid and override per environment.

nameOverride: ""
fullnameOverride: ""

# Used by templates/external-secret.yaml (Vault-backed external secrets /
# CSI secret store). Set secrets.existingSecret: backend-secret to consume
# the synced secret.
vaultAddress: "http://vault.vault:8200"
clusterName: ""

images:
  controlplane:
    repository: registry.vels.online/pulsegrid/controlplane
    tag: "0.7.0"
    pullPolicy: IfNotPresent
  frontend:
    repository: registry.vels.online/pulsegrid/frontend
    tag: "0.7.0"
    pullPolicy: IfNotPresent
  worker:
    repository: registry.vels.online/pulsegrid/worker
    tag: "0.7.0"
    pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""

# --- Control plane -------------------------------------------------------

web:
  replicas: 2
  resources:
    requests: {cpu: 100m, memory: 256Mi}
    limits: {memory: 512Mi}
  gunicorn:
    workers: 4
    threads: 4
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 75

# The scheduler is safe to scale >1 (SELECT ... FOR UPDATE SKIP LOCKED),
# but one replica handles tens of thousands of monitors.
scheduler:
  replicas: 1
  resources:
    requests: {cpu: 50m, memory: 128Mi}
    limits: {memory: 256Mi}

dispatcher:
  replicas: 1
  resources:
    requests: {cpu: 50m, memory: 128Mi}
    limits: {memory: 256Mi}

frontend:
  replicas: 2
  resources:
    requests: {cpu: 25m, memory: 64Mi}
    limits: {memory: 128Mi}

# Optional in-cluster monitoring worker; production fleets usually run the
# worker container in other regions/providers via workers/docker-compose.yaml.
worker:
  enabled: true
  replicas: 1
  # Secret containing WORKER_TOKEN (create one per worker via
  # `manage.py create_worker_token`).
  existingSecret: "in-cluster-worker-secret"
  controlPlaneUrl: "https://pulsegrid.vels.online"  # defaults to the in-cluster web service
  concurrency: 50
  resources:
    requests: {cpu: 50m, memory: 128Mi}
    limits: {memory: 256Mi}

# --- Application configuration -------------------------------------------

config:
  allowedHosts: "pulsegrid.vels.online"
  csrfTrustedOrigins: "https://pulsegrid.vels.online"
  frontendUrl: "https://pulsegrid.vels.online"
  debug: false
  allowSignup: true
  # Region catalog bootstrapped on migrate: "code:Display Name,..."
  regions: "eu-west:Europe West,us-east:US East"
  resultRetentionDays: 30
  authentik:
    providerName: "Authentik"
    # Issuer URL of the Authentik OIDC provider, e.g.
    # https://auth.vels.online/application/o/pulsegrid/
    serverUrl: "https://authentik.vels.online/application/o/pulsegrid/"
    # On-demand user provisioning: when set (together with the
    # AUTHENTIK_API_TOKEN secret key), inviting an email address unknown to
    # Authentik creates a single-use enrollment invitation there. Slug of
    # an enrollment flow that has an Invitation stage bound to it.
    enrollmentFlow: "default-enrollment-flow"
    # Slug of a public (no invitation) enrollment flow for self-service
    # registration; when set, the login page shows a "Create an account"
    # link into Authentik.
    signupFlow: ""
    # Public base URL of Authentik; derived from serverUrl when empty.
    publicUrl: "https://authentik.vels.online"
  email:
    host: ""
    port: 587
    useTls: true
    from: "pulsegrid@vels.online"
  # Audit-event forwarding to the vels.online MSSP platform. Audit events
  # are always written to the database and to stdout as JSON (collect with
  # a Wazuh agent / k8s log pipeline); events >= minSeverity are also sent
  # to the alert-ingest API (POST /api/v2/alerts/). The API token comes
  # from the secret (MSSP_API_TOKEN).
  mssp:
    url: "https://vels.online"
    org: "velsonline"              # organization slug on the MSSP platform
    authScheme: "Token"  # Authorization header scheme
    minSeverity: "medium"
    verifySsl: true
    hostName: "vels.online"

# --- Secrets --------------------------------------------------------------
# Either reference an existing Secret carrying these keys:
#   DJANGO_SECRET_KEY, DATABASE_URL, AUTHENTIK_CLIENT_ID,
#   AUTHENTIK_CLIENT_SECRET, AUTHENTIK_API_TOKEN (optional, provisioning),
#   EMAIL_HOST_USER, EMAIL_HOST_PASSWORD,
#   MSSP_API_TOKEN (REDIS_URL too when redis.enabled=false),
#   VAPID_PUBLIC_KEY + VAPID_PRIVATE_KEY (web push notifications; generate
#   with `manage.py generate_vapid_keys`)
# ...or set values below and the chart renders a Secret for you (fine for
# test environments; use existingSecret + sealed-secrets/SOPS in prod).

secrets:
  existingSecret: "backend-secret"
  djangoSecretKey: ""
  databaseUrl: ""
  redisUrl: ""
  authentikClientId: ""
  authentikClientSecret: ""
  emailHostUser: ""
  emailHostPassword: ""
  msspApiToken: ""
  authentikApiToken: ""
  vapidPublicKey: ""
  vapidPrivateKey: ""

# --- Dependencies ---------------------------------------------------------

# Simple single-node Redis for the work queues. Swap for a managed Redis by
# disabling this and providing REDIS_URL via secrets.
redis:
  enabled: true
  image: redis:7-alpine
  resources:
    requests: {cpu: 50m, memory: 64Mi}
    limits: {memory: 256Mi}

# Dev/test-only PostgreSQL. Use a managed database in production and set
# DATABASE_URL via secrets.
devPostgres:
  enabled: false
  image: postgres:16-alpine
  database: pulsegrid
  username: pulsegrid
  password: pulsegrid-dev-password
  storage: 2Gi
  storageClassName: ""

# --- Networking -----------------------------------------------------------

ingress:
  enabled: true
  className: bunkerweb
  annotations: {}
  host: pulsegrid.vels.online
  tls:
    enabled: true
    secretName: pulsegrid-tls

# --- Jobs -----------------------------------------------------------------

migrations:
  enabled: true

purge:
  enabled: true
  schedule: "0 3 * * *"
