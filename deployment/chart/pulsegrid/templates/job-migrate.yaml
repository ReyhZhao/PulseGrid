{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "pulsegrid.fullname" . }}-migrate
  labels:
    {{- include "pulsegrid.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    # Runs before the new pods roll out, both under plain Helm and ArgoCD.
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "pulsegrid.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: migrate
          image: "{{ .Values.images.controlplane.repository }}:{{ .Values.images.controlplane.tag }}"
          imagePullPolicy: {{ .Values.images.controlplane.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - python manage.py migrate --noinput && python manage.py ensure_regions
          {{- include "pulsegrid.controlplaneEnvFrom" . | nindent 10 }}
{{- end }}
