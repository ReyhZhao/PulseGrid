---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: cluster-pulsegrid
spec:
  instances: 2
  storage:
    storageClass: nfs-csi
    size: 100Gi

  managed:
    roles:
      - name: pulsegrid
        superuser: true
        login: true

  bootstrap:
    initdb:
      database: pulsegrid
      owner: pulsegrid

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: minio-store

---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: cluster-pulsegrid
  labels:
    prometheus: "true"
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: cluster-pulsegrid
  podMetricsEndpoints:
  - port: metrics
---
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: minio-store
spec:
  retentionPolicy: "14d"
  configuration:
    destinationPath: s3://cnpg-backup/
    endpointURL: http://minio.minio:9000
    s3Credentials:
      accessKeyId:
        name: minio
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: minio
        key: ACCESS_SECRET_KEY
    wal:
      compression: gzip

---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: backup-pulsegrid-db
spec:
  cluster:
    name: cluster-pulsegrid
  schedule: '0 9 0 * * *'
  backupOwnerReference: self
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: minio
spec:
  refreshInterval: "120s"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: minio
    creationPolicy: Owner

  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: kv/pulsegrid
        property: ACCESS_KEY_ID

    - secretKey: ACCESS_SECRET_KEY
      remoteRef:
        key: kv/pulsegrid
        property: ACCESS_SECRET_KEY
