apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  annotations:
    # First in line: every ExternalSecret depends on this store.
    argocd.argoproj.io/sync-wave: "-4"
spec:
  provider:
    vault:
      server: "http://vault.vault:8200"
      path: "kv"
      version: "v2"
      auth:
         kubernetes:
           mountPath: "kubernetes"
           role: "k8s-role"