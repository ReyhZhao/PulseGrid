{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "pulsegrid.fullname" . }}-migrate
  labels:
    {{- include "pulsegrid.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    # Sync-phase hook (NOT PreSync): the ConfigMap/Secret this job consumes
    # are regular resources that only exist from the Sync phase onwards, so
    # a PreSync hook deadlocks first-time installs. Waves order the Sync
    # phase instead: secret stores (-4/-3) -> config/secrets/databases (-2)
    # -> this job (-1) -> the application (0).
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-1"
spec:
  # Generous retries: on a fresh install the database (CNPG/devPostgres)
  # may still be initialising when the first attempt runs.
  backoffLimit: 6
  template:
    metadata:
      labels:
        {{- include "pulsegrid.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: migrate
          image: "{{ .Values.images.controlplane.repository }}:{{ .Values.images.controlplane.tag }}"
          imagePullPolicy: {{ .Values.images.controlplane.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - python manage.py migrate --noinput && python manage.py ensure_regions
          {{- include "pulsegrid.controlplaneEnvFrom" . | nindent 10 }}
{{- end }}
