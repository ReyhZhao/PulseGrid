{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "pulsegrid.fullname" . }}
  labels:
    {{- include "pulsegrid.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # The frontend nginx serves the SPA and proxies /api, /_allauth,
          # /accounts, /admin and /django-static to the web service, so a
          # single route covers everything.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "pulsegrid.fullname" . }}-frontend
                port:
                  name: http

          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: {{ include "pulsegrid.fullname" . }}-web
                port:
                  number: 8000
          - path: /admin/
            pathType: Prefix
            backend:
              service:
                name: {{ include "pulsegrid.fullname" . }}-web
                port:
                  number: 8000

          - path: /_allauth/
            pathType: Prefix
            backend:
              service:
                name: {{ include "pulsegrid.fullname" . }}-web
                port:
                  number: 8000

          # Route Django's OIDC callback and static assets straight to web
          # (not via the SPA nginx) so the X-Forwarded-Proto from BunkerWeb
          # reaches Django unmodified — the token-exchange redirect_uri must
          # stay https to match what Authentik has registered.
          - path: /accounts/
            pathType: Prefix
            backend:
              service:
                name: {{ include "pulsegrid.fullname" . }}-web
                port:
                  number: 8000

          - path: /django-static/
            pathType: Prefix
            backend:
              service:
                name: {{ include "pulsegrid.fullname" . }}-web
                port:
                  number: 8000

          - path: /auth/
            pathType: Prefix
            backend:
              service:
                name: {{ include "pulsegrid.fullname" . }}-web
                port:
                  number: 8000
{{- end }}
