{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pulsegrid.fullname" . }}-secrets
  labels:
    {{- include "pulsegrid.labels" . | nindent 4 }}
  annotations:
    # Must exist before the migrate job (sync-wave -1) starts.
    argocd.argoproj.io/sync-wave: "-2"
type: Opaque
stringData:
  DJANGO_SECRET_KEY: {{ required "secrets.djangoSecretKey (or secrets.existingSecret) is required" .Values.secrets.djangoSecretKey | quote }}
  {{- with .Values.secrets.databaseUrl }}
  DATABASE_URL: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.redisUrl }}
  REDIS_URL: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.authentikClientId }}
  AUTHENTIK_CLIENT_ID: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.authentikClientSecret }}
  AUTHENTIK_CLIENT_SECRET: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.emailHostUser }}
  EMAIL_HOST_USER: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.emailHostPassword }}
  EMAIL_HOST_PASSWORD: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.msspApiToken }}
  MSSP_API_TOKEN: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.authentikApiToken }}
  AUTHENTIK_API_TOKEN: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.vapidPublicKey }}
  VAPID_PUBLIC_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.vapidPrivateKey }}
  VAPID_PRIVATE_KEY: {{ . | quote }}
  {{- end }}
{{- end }}
