---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: in-cluster-worker-secret
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  refreshInterval: "120s"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: in-cluster-worker-secret
    creationPolicy: Owner
  data:
    - secretKey: WORKER_TOKEN
      remoteRef:
        key: kv/pulsegrid
        property: WORKER_TOKEN

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backend-secret
  annotations:
    # Synced (and healthy = target secret created) before the wave -2
    # consumers and the migrate job at wave -1.
    argocd.argoproj.io/sync-wave: "-3"
spec:
  refreshInterval: "120s"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: backend-secret
    creationPolicy: Owner

  # All secret env vars consumed by the control plane (see values.yaml
  # `secrets:` section and controlplane/pulsegrid/settings.py). To use this
  # secret, set `secrets.existingSecret: backend-secret` in values.
  #
  # NOTE: external-secrets fails the whole sync if a property is missing in
  # Vault — remove entries you don't use (e.g. REDIS_URL when running the
  # in-chart Redis, EMAIL_* when sending via an unauthenticated relay).
  data:

    # Required — Django signing key.
    - secretKey: DJANGO_SECRET_KEY
      remoteRef:
        key: kv/pulsegrid
        property: DJANGO_SECRET_KEY

    # Required — PostgreSQL DSN, e.g. postgres://user:pass@host:5432/pulsegrid
    - secretKey: DATABASE_URL
      remoteRef:
        key: kv/pulsegrid
        property: DATABASE_URL

    # Only when redis.enabled=false (external/managed Redis); overrides the
    # in-chart Redis URL from the ConfigMap.
    - secretKey: REDIS_URL
      remoteRef:
        key: kv/pulsegrid
        property: REDIS_URL

    # Authentik SSO (OIDC client credentials).
    - secretKey: AUTHENTIK_CLIENT_ID
      remoteRef:
        key: kv/pulsegrid
        property: AUTHENTIK_CLIENT_ID
    - secretKey: AUTHENTIK_CLIENT_SECRET
      remoteRef:
        key: kv/pulsegrid
        property: AUTHENTIK_CLIENT_SECRET
    # Optional — Authentik service-account API token for on-demand user
    # provisioning during org invitations.
    - secretKey: AUTHENTIK_API_TOKEN
      remoteRef:
        key: kv/pulsegrid
        property: AUTHENTIK_API_TOKEN

    # SMTP credentials for alert emails.
    - secretKey: EMAIL_HOST_USER
      remoteRef:
        key: kv/pulsegrid
        property: EMAIL_HOST_USER
    - secretKey: EMAIL_HOST_PASSWORD
      remoteRef:
        key: kv/pulsegrid
        property: EMAIL_HOST_PASSWORD

    # Staff API token for audit-event forwarding to the MSSP platform
    # (vels.online alert-ingest API).
    - secretKey: MSSP_API_TOKEN
      remoteRef:
        key: kv/pulsegrid
        property: MSSP_API_TOKEN

    # Web push (VAPID) key pair — generate once with
    # `manage.py generate_vapid_keys` and store both in Vault. Only the
    # private key is sensitive; keeping the pair together keeps them in sync.
    - secretKey: VAPID_PUBLIC_KEY
      remoteRef:
        key: kv/pulsegrid
        property: VAPID_PUBLIC_KEY
    - secretKey: VAPID_PRIVATE_KEY
      remoteRef:
        key: kv/pulsegrid
        property: VAPID_PRIVATE_KEY

---

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: secret-provider-class-acr
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  provider: vault
  secretObjects:
    - data:
        - key: .dockerconfigjson
          objectName: .dockerconfigjson
      secretName: azure-acr
      type: kubernetes.io/dockerconfigjson
  parameters:
    vaultAddress: {{ .Values.vaultAddress }}
    vaultKubernetesMountPath: "kubernetes/{{ .Values.clusterName }}"
    roleName: "azure_devops_agent_acr"
    objects: |
      - objectName: ".dockerconfigjson"
        secretPath: "secret/devops/agents/acr"
        secretKey: ".dockerconfigjson"
